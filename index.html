<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рулетка слов - Тестирование Qwen 3.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎡 Рулетка слов</h1>
        <p class="subtitle">Проект для тестирования Qwen 3.5</p>
        
        <div class="wheel-container">
            <canvas id="wheel" width="500" height="500"></canvas>
            <div class="pointer"></div>
        </div>
        
        <div class="controls">
            <button id="spinBtn" class="spin-button">🔄 Крутить рулетку!</button>
            <div id="result" class="result"></div>
        </div>
        
        <div class="words-section">
            <h2>📝 Ваши слова</h2>
            <div class="input-group">
                <input type="text" id="wordInput" placeholder="Введите слово..." />
                <button id="addWordBtn" class="add-button">➕ Добавить</button>
            </div>
            <div id="wordsList" class="words-list"></div>
            <button id="clearBtn" class="clear-button">🗑️ Очистить все</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
